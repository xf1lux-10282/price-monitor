name: 価格モニター

# 定期実行 + 手動実行。スケジュールは「デフォルトブランチ」のものだけが
# 動く点に注意（このワークフローを master にマージすると自動巡回が始まります）。
#
# 主トリガーは外部cron（cron-job.org 等）からの workflow_dispatch で1時間毎。
# 下の schedule は予備（GitHub の cron はドロップされやすいため日6回だけ残す）。
on:
  schedule:
    # cron は UTC 指定。予備なので日本時間(JST=UTC+9)の 6,9,12,15,18,21時台のみ。
    #   JST 6→UTC21 / 9→0 / 12→3 / 15→6 / 18→9 / 21→12
    # 分は :17 にずらしている。GitHub Actions は毎時 :00 が最も混雑し
    # スケジュールが遅延・スキップされやすいため（公式の推奨に従う）。
    - cron: "17 21,0,3,6,9,12 * * *"
  workflow_dispatch:
    inputs:
      only:
        description: "特定の商品 id だけチェック（空なら全部）"
        required: false
        default: ""

# 同時実行を防ぐ（履歴コミットの競合回避）
concurrency:
  group: price-monitor
  cancel-in-progress: false

permissions:
  contents: write   # 価格履歴をリポジトリにコミットするため
  pages: write      # GitHub Pages へデプロイするため
  id-token: write   # Pages デプロイの認証

jobs:
  monitor:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: 依存関係のインストール
        run: pip install -r requirements.txt

      - name: 価格チェック
        env:
          # GitHub の Settings > Secrets and variables > Actions に登録した値が入ります。
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "${{ github.event.inputs.only }}" ]; then
            python monitor.py --only "${{ github.event.inputs.only }}"
          else
            python monitor.py
          fi

      - name: 価格履歴をコミット
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "変更なし"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(price-monitor): update price history [skip ci]"
            # 同時刻に複数の実行が走ると push が競合するため、rebase してリトライ
            pushed=false
            for i in 1 2 3 4 5; do
              if git push; then pushed=true; break; fi
              echo "push が競合。最新を取り込んで再試行 ($i/5)"
              git pull --rebase --autostash origin master || true
              sleep $((RANDOM % 4 + 2))
            done
            if [ "$pushed" != "true" ]; then
              echo "::warning::push に複数回失敗しました（次回実行で再記録されます）"
            fi
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy-pages:
    needs: monitor
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # どの試行で成功しても、その URL を採用する
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url || steps.deployment_retry2.outputs.page_url || steps.deployment_final.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}   # monitor がコミットした最新を取得

      - name: サイトを組み立て（ダッシュボード + データ）
        run: |
          mkdir -p _site
          cp -r docs/* _site/
          mkdir -p _site/data
          cp -r data/* _site/data/ 2>/dev/null || true

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      # GitHub Pages 側の一時不具合（"Deployment failed, try again later" や
      # アーティファクト取得失敗など）は単発で起きやすい。1回だと吸収しきれない
      # ことがあるため、待機を延ばしながら最大4回まで再試行する。
      # 途中の試行は continue-on-error で失敗を握りつぶし、最後の試行だけ
      # 本当の失敗としてジョブを落とす（＝4回連続で失敗したときのみ通知）。

      # 試行1
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      # 試行2（試行1が失敗したときだけ）
      - name: 再試行前の待機（20秒）
        if: steps.deployment.outcome == 'failure'
        run: sleep 20
      - id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      # 試行3（試行1・2がともに失敗したときだけ）
      - name: 再試行前の待機（45秒）
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: sleep 45
      - id: deployment_retry2
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      # 試行4＝最終（試行1・2・3がすべて失敗したときだけ）。ここは
      # continue-on-error を付けないので、失敗すればジョブが失敗＝通知される。
      - name: 再試行前の待機（90秒）
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure' && steps.deployment_retry2.outcome == 'failure'
        run: sleep 90
      - id: deployment_final
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure' && steps.deployment_retry2.outcome == 'failure'
        uses: actions/deploy-pages@v4
