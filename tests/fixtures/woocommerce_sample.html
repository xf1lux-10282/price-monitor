<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sodium Platinum (Na2) Standard 20% Solution 10 ml</title>
  <!-- WooCommerce が出力する典型的な JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org/",
    "@type": "Product",
    "name": "Sodium Platinum (Na2) Standard 20% Solution 10 ml",
    "offers": {
      "@type": "Offer",
      "price": "78.50",
      "priceCurrency": "USD",
      "availability": "https://schema.org/InStock"
    }
  }
  </script>
</head>
<body>
  <div class="product">
    <h1 class="product_title">Sodium Platinum (Na2) Standard 20% Solution 10 ml</h1>
    <p class="price">
      <span class="woocommerce-Price-amount amount">
        <bdi><span class="woocommerce-Price-currencySymbol">$</span>78.50</bdi>
      </span>
    </p>
  </div>
</body>
</html>
